<script>
    // State management
    let members = JSON.parse(localStorage.getItem('tripMembers')) || [];
    let expenses = JSON.parse(localStorage.getItem('tripExpenses')) || [];

    // Helper functions
    const formatCurrency = (amount) => '₹' + parseFloat(amount).toFixed(2);
    const getInitials = (name) => name.substring(0, 2).toUpperCase();
    
    function saveData() {
        localStorage.setItem('tripMembers', JSON.stringify(members));
        localStorage.setItem('tripExpenses', JSON.stringify(expenses));
    }

    // --- Member Management ---
    function addMember(e) {
        e.preventDefault();
        const input = document.getElementById('memberName');
        const name = input.value.trim();
        const errorEl = document.getElementById('memberError');
        
        if (!name) {
            errorEl.innerText = "Name cannot be empty.";
            errorEl.style.display = 'block';
            return;
        }
        
        if (members.some(m => m.toLowerCase() === name.toLowerCase())) {
            errorEl.innerText = "Member already exists.";
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';
        members.push(name);
        input.value = '';
        saveData();
        updateUI();
    }

    function removeMember(name) {
        if(expenses.some(e => e.payer === name)) {
            alert("Cannot remove a member who has paid an expense. Remove the expenses first.");
            return;
        }
        members = members.filter(m => m !== name);
        saveData();
        updateUI();
    }

    // --- Expense Management ---
    function addExpense(e) {
        e.preventDefault();
        const amountInput = document.getElementById('expenseAmount');
        const payerSelect = document.getElementById('expensePayer');
        const descInput = document.getElementById('expenseDesc');
        const errorEl = document.getElementById('expenseError');

        const amount = parseFloat(amountInput.value);
        const payer = payerSelect.value;
        const desc = descInput.value.trim() || 'General Expense';

        if (!amount || amount <= 0 || !payer) {
            errorEl.style.display = 'block';
            return;
        }

        if (members.length === 0) {
            alert("Please add at least one member first.");
            return;
        }

        errorEl.style.display = 'none';
        
        expenses.push({
            id: Date.now().toString(),
            amount: amount,
            payer: payer,
            desc: desc,
            date: new Date().toLocaleDateString()
        });

        amountInput.value = '';
        descInput.value = '';
        payerSelect.value = '';
        
        saveData();
        updateUI();
    }

    function removeExpense(id) {
        expenses = expenses.filter(e => e.id !== id);
        saveData();
        updateUI();
    }

    // --- Core Logic & Algorithm ---
    function calculateSettlements() {
        if (members.length === 0) return { total: 0, perPerson: 0, balances: {}, settlements: [] };

        // 1. Calculate Totals
        const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
        const perPerson = total / members.length;

        // 2. Calculate balances (Paid - PerPerson)
        const balances = {};
        members.forEach(m => balances[m] = -perPerson); // Initialize everyone with debt of per-person
        expenses.forEach(exp => {
            if(balances[exp.payer] !== undefined) {
                balances[exp.payer] += exp.amount;
            }
        });

        // 3. Smart Settlement Algorithm (Minimize transactions)
        // Separate into debtors (balance < 0) and creditors (balance > 0)
        let debtors = [];
        let creditors = [];
        
        for (let m of members) {
            let balance = Number(balances[m].toFixed(2));
            if (balance < 0) debtors.push({ name: m, amount: Math.abs(balance) });
            else if (balance > 0) creditors.push({ name: m, amount: balance });
        }

        // Sort both descending by amount to settle the largest chunks first
        debtors.sort((a, b) => b.amount - a.amount);
        creditors.sort((a, b) => b.amount - a.amount);

        const settlements = [];
        let d = 0, c = 0;

        while (d < debtors.length && c < creditors.length) {
            let debtor = debtors[d];
            let creditor = creditors[c];
            
            // Limit precision issues
            if (debtor.amount < 0.01) { d++; continue; }
            if (creditor.amount < 0.01) { c++; continue; }

            // Find minimum of what debtor owes and creditor needs
            let settledAmount = Math.min(debtor.amount, creditor.amount);
            
            settlements.push({
                from: debtor.name,
                to: creditor.name,
                amount: settledAmount
            });

            // Adjust remaining amounts
            debtor.amount -= settledAmount;
            creditor.amount -= settledAmount;

            // Move to next if fulfilled
            if (debtor.amount < 0.01) d++;
            if (creditor.amount < 0.01) c++;
        }

        return { total, perPerson, balances, settlements };
    }

    // --- Export / Copy to Clipboard ---
    function copySettlementToClipboard() {
        const { total, perPerson, balances, settlements } = calculateSettlements();
        if (members.length === 0) {
            alert("No data to copy.");
            return;
        }

        let textToCopy = `🛫 Trip Expense Summary:\n\n`;
        textToCopy += `👥 Total Members: ${members.length}\n`;
        textToCopy += `💰 Total Group Expense: ${formatCurrency(total)}\n`;
        textToCopy += `🧍 Equal Share / Person: ${formatCurrency(perPerson)}\n\n`;
        
        textToCopy += `📊 Individual Balances:\n`;
        members.forEach(m => {
            const bal = balances[m] || 0;
            if (bal > 0.01) textToCopy += `- ${m} receives ${formatCurrency(bal)}\n`;
            else if (bal < -0.01) textToCopy += `- ${m} owes ${formatCurrency(Math.abs(bal))}\n`;
            else textToCopy += `- ${m} is settled up\n`;
        });

        textToCopy += `\n💸 How to Settle Up:\n`;
        if (settlements.length === 0) {
            textToCopy += `Everyone is settled up! Zero balances.\n`;
        } else {
            settlements.forEach(s => {
                textToCopy += `➡ ${s.from} pays ${s.to} ${formatCurrency(s.amount)}\n`;
            });
        }
        
        textToCopy += `\nGenerated via Calcora Trip Expense Splitter`;

        // Modern clipboard API
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = document.querySelector('.settlements-wrapper button');
                const oldHTML = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = oldHTML, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert("Failed to copy to clipboard.");
            });
        } else {
            // Fallback for non-https / older browsers
            let textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                const btn = document.querySelector('.settlements-wrapper button');
                const oldHTML = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = oldHTML, 2000);
            } catch (err) {
                console.error('Fallback copy failed', err);
                alert("Failed to copy to clipboard.");
            }
            textArea.remove();
        }
    }

    // --- UI Rendering ---
    function updateUI() {
        const bdg = document.getElementById('memberCountBadge');
        if (bdg) bdg.innerText = members.length;

        renderMembers();
        renderExpenseFormSelect();
        renderExpenses();
        renderSummary();
    }

    function renderMembers() {
        const list = document.getElementById('membersList');
        if (members.length === 0) {
            list.innerHTML = `<div class="empty-state">No members added yet. Add someone to start splitting!</div>`;
            return;
        }

        list.innerHTML = members.map(name => `
            <div class="list-item">
                <div class="member-info">
                    <div class="avatar">${getInitials(name)}</div>
                    <span style="font-weight: 500">${name}</span>
                </div>
                <button class="btn-icon no-print" onclick="removeMember('${name}')" title="Remove member">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                </button>
            </div>
        `).join('');
    }

    function renderExpenseFormSelect() {
        const select = document.getElementById('expensePayer');
        const currentValue = select.value;
        
        select.innerHTML = '<option value="" disabled selected>Select payer...</option>' + 
            members.map(m => `<option value="${m}">${m}</option>`).join('');
            
        // Restore value if still present
        if (members.includes(currentValue)) {
            select.value = currentValue;
        }
    }

    function renderExpenses() {
        const list = document.getElementById('expensesList');
        if (expenses.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg>
                No expenses added yet.
            </div>`;
            return;
        }

        // Show newest first
        const sortedExpenses = [...expenses].reverse();
        
        list.innerHTML = sortedExpenses.map(exp => `
            <div class="list-item" style="align-items: flex-start;">
                <div class="expense-info">
                    <div class="avatar" style="background:#E2E8F0; color:#475569; border-radius:8px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <div>
                        <div class="expense-desc">${exp.desc}</div>
                        <div class="expense-meta">Paid by <strong>${exp.payer}</strong> • ${exp.date}</div>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap: 1rem;">
                    <span class="amount">${formatCurrency(exp.amount)}</span>
                    <button class="btn-icon no-print" onclick="removeExpense('${exp.id}')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function renderSummary() {
        const { total, perPerson, balances, settlements } = calculateSettlements();
        
        document.getElementById('totalExpense').innerText = formatCurrency(total);
        document.getElementById('perPersonShare').innerText = formatCurrency(perPerson);

        // Balances List
        const balanceListEl = document.getElementById('balancesList');
        if (members.length === 0) {
            balanceListEl.innerHTML = `<div class="empty-state" style="padding:1rem;">Add members to see individual balances.</div>`;
        } else {
            balanceListEl.innerHTML = members.map(m => {
                const bal = balances[m] || 0;
                let colorClass = bal > 0.01 ? 'positive' : (bal < -0.01 ? 'negative' : '');
                let balText = bal > 0.01 ? `Gets ${formatCurrency(bal)}` : 
                             (bal < -0.01 ? `Owes ${formatCurrency(Math.abs(bal))}` : 'Settled up');
                             
                return `
                <div class="balance-item">
                    <div class="name">${m}</div>
                    <div class="amount ${colorClass}">${balText}</div>
                </div>`;
            }).join('');
        }

        // Settlements List
        const settleListEl = document.getElementById('settlementList');
        if (settlements.length === 0) {
            settleListEl.innerHTML = `<div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Everyone is settled up! Zero balances.
            </div>`;
            return;
        }

        settleListEl.innerHTML = settlements.map(s => `
            <div class="settlement-card">
                <div class="settlement-person payer">
                    <div class="avatar">${getInitials(s.from)}</div>
                    <span>${s.from}</span>
                </div>
                
                <div class="settlement-action">
                    pays
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>

                <div class="settlement-person receiver">
                    <div class="avatar">${getInitials(s.to)}</div>
                    <span>${s.to}</span>
                </div>

                <div class="settlement-amount">
                    ${formatCurrency(s.amount)}
                </div>
            </div>
        `).join('');
    }

    function resetData() {
        if(confirm("Are you sure you want to clear all members and expenses? This cannot be undone.")) {
            members = [];
            expenses = [];
            saveData();
            updateUI();
        }
    }

    // Initial load
    updateUI();
</script>

</body>
</html>
