<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PDF Merge — Combine Multiple PDFs Online | Calcora</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<meta name="description" content="Combine multiple PDF files into one document in seconds. 100% private: tool runs entirely in your browser. No registration required.">
<meta name="keywords" content="pdf merge, combine pdf, merge pdf free, pdf tools, online pdf merger, secure pdf">
<link rel="canonical" href="https://calcora.com/files/pdf-merge.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script
        type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"PDF Merge","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","url":"https://calcora.com/files/pdf-merge.html"}</script>
</head>

<body>
    <div class="bgfx"></div>
    <nav class="navbar"><div class="nav-in"><a href="../index.html" class="logo"><img src="../assets/logo.png" class="logo-img" alt="Calcora Logo"><span class="logo-t">Calcora</span></a><ul class="nav-links" id="nav-links"><li><a href="../index.html" class="nav-link">🏠 Home</a></li><li><a href="pdf-merge.html" class="nav-link active">📑 Merge</a></li><li><a href="pdf-split.html" class="nav-link">✂️ Split</a></li><li><a href="jpg-png-converter.html" class="nav-link">🖼️ JPG/PNG</a></li></ul><div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme"><span class="t-icon ic-sun">☀️</span><div class="t-track"><div class="t-knob"></div></div><span class="t-icon ic-moon">🌙</span></div><button class="hamburger" id="hamburger" aria-label="Menu">☰</button></div></nav>
    <div class="page fade-in"><a href="../index.html" class="back">← Back to all tools</a>
        <div class="mod-hdr">
            <h1>PDF Merge</h1>
            <p>Combine multiple PDF files into a single document. 100% client-side.</p>
        </div>
        <div class="glass">
            <div class="ctitle"><i>📤</i> Upload PDF Files</div>
            <label
                style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;border:2px dashed var(--gbdr);border-radius:14px;cursor:pointer;text-align:center">
                <span style="font-size:2rem;margin-bottom:8px">📁</span>
                <span style="font-size:.85rem;color:var(--dim)">Click to select PDFs (multi-select)</span>
                <input type="file" id="files" accept=".pdf" multiple style="display:none">
            </label>
            <div id="list" style="margin-top:16px"></div>
            <div style="display:flex;gap:10px;margin-top:16px">
                <button class="btn btn-accent" style="flex:1" onclick="mergePDFs()" id="merge-btn" disabled>📑 Merge
                    PDFs</button>
                <button class="btn btn-outline" onclick="clearAll()">🗑️ Clear</button>
            </div>
            <div id="status" style="margin-top:12px;font-size:.82rem;font-weight:600;text-align:center"></div>
        </div>
    </div>
    <footer class="site-ft">
        <p>© 2026 <a href="../index.html">Calcora</a></p>
    </footer>
    <script src="../script.js"></script>
    <script>
        let pdfFiles = [];
        const fileInput = document.getElementById('files'), listEl = document.getElementById('list'), st = document.getElementById('status');
        fileInput.addEventListener('change', e => {
            pdfFiles = [...pdfFiles, ...e.target.files]; renderList();
            document.getElementById('merge-btn').disabled = pdfFiles.length < 2;
        });
        function renderList() {
            listEl.innerHTML = ''; pdfFiles.forEach((f, i) => {
                const d = document.createElement('div'); d.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);border:1px solid var(--gbdr);border-radius:10px;margin-bottom:6px;font-size:.82rem;';
                d.innerHTML = `<span>📄 ${f.name} <span style="color:var(--dim)">(${(f.size / 1024).toFixed(0)} KB)</span></span><button class="copy-btn" onclick="removeFile(${i})" style="font-size:.7rem">✕</button>`;
                listEl.appendChild(d);
            });
        }
        function removeFile(i) { pdfFiles.splice(i, 1); renderList(); document.getElementById('merge-btn').disabled = pdfFiles.length < 2; }
        function clearAll() { pdfFiles = []; renderList(); st.textContent = ''; document.getElementById('merge-btn').disabled = true; }
        async function mergePDFs() {
            if (pdfFiles.length < 2) return;
            st.style.color = 'var(--amber)'; st.textContent = '⏳ Merging...';
            try {
                const merged = await PDFLib.PDFDocument.create();
                for (const f of pdfFiles) {
                    const bytes = await f.arrayBuffer();
                    const doc = await PDFLib.PDFDocument.load(bytes);
                    const pages = await merged.copyPages(doc, doc.getPageIndices());
                    pages.forEach(p => merged.addPage(p));
                }
                const out = await merged.save();
                const blob = new Blob([out], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'merged.pdf'; a.click();
                URL.revokeObjectURL(url);
                st.style.color = 'var(--emerald)'; st.textContent = `✅ Merged ${pdfFiles.length} PDFs successfully! (${(out.byteLength / 1024).toFixed(0)} KB)`;
            } catch (e) { st.style.color = 'var(--rose)'; st.textContent = '❌ Error: ' + e.message; }
        }
    </script>
</body>

</html>
