<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Image Resizer — Change Image Dimensions | Calcora</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<meta name="description" content="Resize images to specific pixel dimensions or percentages. Free online tool for JPEG and PNG files. Maintain aspect ratio easily.">
<meta name="keywords" content="image resizer, resize image online, change image size, pixel resizer, crop image, photo tools">
<link rel="canonical" href="https://calcora.com/files/image-resizer.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script
        type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"Image Resizer","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","url":"https://calcora.com/files/image-resizer.html"}</script>
</head>

<body>
    <div class="bgfx"></div>
    <nav class="navbar"><div class="nav-in"><a href="../index.html" class="logo"><img src="../assets/logo.png" class="logo-img" alt="Calcora Logo"><span class="logo-t">Calcora</span></a><ul class="nav-links" id="nav-links"><li><a href="../index.html" class="nav-link">🏠 Home</a></li><li><a href="image-resizer.html" class="nav-link active">📏 Resize</a></li><li><a href="jpg-png-converter.html" class="nav-link">🖼️ JPG/PNG</a></li><li><a href="../tech/image-compressor.html" class="nav-link">🗜️ Image</a></li></ul><div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme"><span class="t-icon ic-sun">☀️</span><div class="t-track"><div class="t-knob"></div></div><span class="t-icon ic-moon">🌙</span></div><button class="hamburger" id="hamburger" aria-label="Menu">☰</button></div></nav>
    <div class="page fade-in"><a href="../index.html" class="back">← Back to all tools</a>
        <div class="mod-hdr">
            <h1>Image Resizer</h1>
            <p>Resize images to exact dimensions or by percentage with aspect ratio lock.</p>
        </div>
        <div class="tool-grid">
            <div class="glass">
                <div class="ctitle"><i>📤</i> Upload & Resize</div>
                <label
                    style="display:flex;flex-direction:column;align-items:center;padding:30px 20px;border:2px dashed var(--gbdr);border-radius:14px;cursor:pointer;text-align:center">
                    <span style="font-size:2rem;margin-bottom:8px">🖼️</span>
                    <span style="font-size:.85rem;color:var(--dim)">Click to select an image</span>
                    <input type="file" id="file" accept="image/*" style="display:none">
                </label>
                <div id="orig-info" style="margin-top:10px;font-size:.78rem;color:var(--dim)"></div>
                <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end;margin-top:14px">
                    <div class="ig">
                        <div class="il"><span>Width (px)</span></div><input type="number" class="ti" id="w" value="800"
                            min="1">
                    </div>
                    <label
                        style="display:flex;align-items:center;gap:4px;font-size:.72rem;padding-bottom:10px;cursor:pointer"><input
                            type="checkbox" id="lock" checked>🔗</label>
                    <div class="ig">
                        <div class="il"><span>Height (px)</span></div><input type="number" class="ti" id="h" value="600"
                            min="1">
                    </div>
                </div>
                <div class="ig">
                    <div class="il"><span>Or Scale by %</span><span class="v" id="sc-v">100%</span></div><input
                        type="range" id="scale" min="10" max="200" step="5" value="100">
                    <div class="rl"><span>10%</span><span>200%</span></div>
                </div>
                <div class="ig">
                    <div class="il"><span>Format</span></div><select class="ti" id="fmt">
                        <option value="image/png">PNG</option>
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                </div>
                <button class="btn btn-accent" style="width:100%;margin-top:10px" onclick="resize()" id="go" disabled>↔️
                    Resize & Download</button>
            </div>
            <div class="glass" style="text-align:center">
                <div class="ctitle"><i>👁️</i> Preview</div>
                <img id="preview"
                    style="max-width:100%;max-height:300px;border-radius:12px;display:none;margin:12px auto">
                <div id="status" style="margin-top:10px;font-size:.82rem;font-weight:600"></div>
            </div>
        </div>
    </div>
    <footer class="site-ft">
        <p>© 2026 <a href="../index.html">Calcora</a></p>
    </footer>
    <script src="../script.js"></script>
    <script>
        let origW = 0, origH = 0, origFile = null, ratio = 1;
        document.getElementById('file').addEventListener('change', e => {
            origFile = e.target.files[0]; if (!origFile) return;
            const img = new Image(), r = new FileReader();
            r.onload = ev => {
                img.onload = () => {
                    origW = img.naturalWidth; origH = img.naturalHeight; ratio = origW / origH;
                    document.getElementById('w').value = origW; document.getElementById('h').value = origH;
                    document.getElementById('orig-info').textContent = `Original: ${origW}×${origH} — ${(origFile.size / 1024).toFixed(0)} KB`;
                    document.getElementById('go').disabled = false;
                    document.getElementById('preview').src = ev.target.result; document.getElementById('preview').style.display = 'block';
                }; img.src = ev.target.result;
            }; r.readAsDataURL(origFile);
        });
        document.getElementById('w').addEventListener('input', function () { if (document.getElementById('lock').checked) document.getElementById('h').value = Math.round(this.value / ratio); });
        document.getElementById('h').addEventListener('input', function () { if (document.getElementById('lock').checked) document.getElementById('w').value = Math.round(this.value * ratio); });
        document.getElementById('scale').addEventListener('input', function () {
            document.getElementById('sc-v').textContent = this.value + '%';
            const s = this.value / 100; document.getElementById('w').value = Math.round(origW * s); document.getElementById('h').value = Math.round(origH * s);
        });
        function resize() {
            if (!origFile) return;
            const w = +document.getElementById('w').value, h = +document.getElementById('h').value, fmt = document.getElementById('fmt').value;
            const img = new Image(), r = new FileReader();
            r.onload = ev => {
                img.onload = () => {
                    const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
                    cv.getContext('2d').drawImage(img, 0, 0, w, h);
                    cv.toBlob(blob => {
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'resized.' + fmt.split('/')[1]; a.click();
                        document.getElementById('status').style.color = 'var(--emerald)';
                        document.getElementById('status').textContent = `✅ Resized to ${w}×${h} (${(blob.size / 1024).toFixed(0)} KB)`;
                    }, fmt, 0.92);
                }; img.src = ev.target.result;
            }; r.readAsDataURL(origFile);
        }
        document.addEventListener('DOMContentLoaded', () => C.initSliders());
    </script>
</body>

</html>
