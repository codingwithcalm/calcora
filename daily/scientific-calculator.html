    <style>
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 16px
        }

        .calc-btn {
            padding: 14px 8px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--gbdr);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            text-align: center
        }

        .calc-btn:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-1px)
        }

        .calc-btn.op {
            color: var(--accent2)
        }

        .calc-btn.eq {
            background: var(--accent);
            color: #fff
        }

        .calc-btn.fn {
            color: var(--cyan);
            font-size: .75rem
        }

        .calc-display {
            background: var(--inputBg);
            border: 1px solid var(--inputBdr);
            border-radius: 14px;
            padding: 18px 16px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: right;
            color: var(--heading);
            font-family: 'Inter', monospace;
            min-height: 70px;
            word-break: break-all;
            margin-bottom: 4px
        }

        .calc-expr {
            font-size: .75rem;
            color: var(--dim);
            text-align: right;
            min-height: 18px;
            padding: 0 4px
        }

<body>
    <div class="bgfx"></div>
    <nav class="navbar"><div class="nav-in"><a href="../index.html" class="logo"><img src="../assets/logo.png" class="logo-img" alt="Calcora Logo"><span class="logo-t">Calcora</span></a><ul class="nav-links" id="nav-links"><li><a href="../index.html" class="nav-link">🏠 Home</a></li><li><a href="scientific-calculator.html" class="nav-link active">🔬 Sci Calc</a></li><li><a href="../tech/json-formatter.html" class="nav-link">💻 JSON</a></li></ul><div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme"><span class="t-icon ic-sun">☀️</span><div class="t-track"><div class="t-knob"></div></div><span class="t-icon ic-moon">🌙</span></div><button class="hamburger" id="hamburger" aria-label="Menu">☰</button></div></nav>
    <div class="page fade-in"><a href="../index.html" class="back">← Back to all tools</a>
        <div class="mod-hdr">
            <h1>Scientific Calculator</h1>
            <p>Full-featured calculator with trig, logs, powers, and memory.</p>
        </div>
        <div style="max-width:460px;margin:0 auto">
            <div class="glass">
                <div class="calc-expr" id="expr"></div>
                <div class="calc-display" id="display">0</div>
                <div class="calc-grid">
                    <button class="calc-btn fn" onclick="sciOp('sin')">sin</button><button class="calc-btn fn"
                        onclick="sciOp('cos')">cos</button><button class="calc-btn fn"
                        onclick="sciOp('tan')">tan</button><button class="calc-btn fn"
                        onclick="sciOp('log')">log</button><button class="calc-btn fn" onclick="sciOp('ln')">ln</button>
                    <button class="calc-btn fn" onclick="sciOp('sqrt')">√</button><button class="calc-btn fn"
                        onclick="sciOp('pow2')">x²</button><button class="calc-btn fn"
                        onclick="sciOp('pow3')">x³</button><button class="calc-btn fn"
                        onclick="sciOp('inv')">1/x</button><button class="calc-btn fn"
                        onclick="sciOp('fact')">n!</button>
                    <button class="calc-btn fn" onclick="sciOp('pi')">π</button><button class="calc-btn fn"
                        onclick="sciOp('e')">e</button><button class="calc-btn op"
                        onclick="inputOp('(')">(</button><button class="calc-btn op"
                        onclick="inputOp(')')">)</button><button class="calc-btn op" onclick="clearAll()">AC</button>
                    <button class="calc-btn" onclick="inputNum('7')">7</button><button class="calc-btn"
                        onclick="inputNum('8')">8</button><button class="calc-btn"
                        onclick="inputNum('9')">9</button><button class="calc-btn op"
                        onclick="inputOp('/')">÷</button><button class="calc-btn" onclick="backspace()">⌫</button>
                    <button class="calc-btn" onclick="inputNum('4')">4</button><button class="calc-btn"
                        onclick="inputNum('5')">5</button><button class="calc-btn"
                        onclick="inputNum('6')">6</button><button class="calc-btn op"
                        onclick="inputOp('*')">×</button><button class="calc-btn fn" onclick="memOp('MS')">MS</button>
                    <button class="calc-btn" onclick="inputNum('1')">1</button><button class="calc-btn"
                        onclick="inputNum('2')">2</button><button class="calc-btn"
                        onclick="inputNum('3')">3</button><button class="calc-btn op"
                        onclick="inputOp('-')">−</button><button class="calc-btn fn" onclick="memOp('MR')">MR</button>
                    <button class="calc-btn" onclick="inputNum('0')">0</button><button class="calc-btn"
                        onclick="inputNum('.')">.</button><button class="calc-btn fn"
                        onclick="toggleSign()">±</button><button class="calc-btn op"
                        onclick="inputOp('+')">+</button><button class="calc-btn eq" onclick="calculate()">=</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        let expr = '', mem = 0, justCalc = false;
        const D = () => document.getElementById('display'), E = () => document.getElementById('expr');
        function inputNum(n) { if (justCalc) { expr = ''; justCalc = false; } expr += n; D().textContent = expr; E().textContent = ''; }
        function inputOp(o) { justCalc = false; expr += o; D().textContent = expr; E().textContent = ''; }
        function clearAll() { expr = ''; D().textContent = '0'; E().textContent = ''; justCalc = false; }
        function backspace() { expr = expr.slice(0, -1); D().textContent = expr || '0'; }
        function toggleSign() { const v = parseFloat(D().textContent); if (!isNaN(v)) { expr = String(-v); D().textContent = expr; } }
        function calculate() { try { let e = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-'); const r = Function('"use strict";return(' + e + ')')(); E().textContent = expr + '='; expr = String(+r.toFixed(10)); D().textContent = expr; justCalc = true; } catch (e) { D().textContent = 'Error'; expr = ''; } }
        function sciOp(fn) {
            const v = parseFloat(D().textContent) || 0; let r = 0;
            if (fn === 'sin') r = Math.sin(v * Math.PI / 180); else if (fn === 'cos') r = Math.cos(v * Math.PI / 180); else if (fn === 'tan') r = Math.tan(v * Math.PI / 180);
            else if (fn === 'log') r = Math.log10(v); else if (fn === 'ln') r = Math.log(v); else if (fn === 'sqrt') r = Math.sqrt(v);
            else if (fn === 'pow2') r = v * v; else if (fn === 'pow3') r = v * v * v; else if (fn === 'inv') r = v !== 0 ? 1 / v : 0;
            else if (fn === 'pi') { expr += Math.PI; D().textContent = expr; return; }
            else if (fn === 'e') { expr += Math.E; D().textContent = expr; return; }
            else if (fn === 'fact') { r = 1; for (let i = 2; i <= Math.min(v, 170); i++)r *= i; }
            E().textContent = fn + '(' + v + ')='; expr = String(+r.toFixed(10)); D().textContent = expr; justCalc = true;
        }
        function memOp(op) { if (op === 'MS') mem = parseFloat(D().textContent) || 0; else if (op === 'MR') { expr += mem; D().textContent = expr; } }
    </script>
