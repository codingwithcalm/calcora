<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Unit Converter — Length, Weight, Temp & More | Calcora</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <meta name="description" content="Free multi-unit converter. Convert length, weight, temperature, volume, area, and data units instantly on one page.">
    <meta name="keywords" content="unit converter, length converter, weight converter, temp converter, online unit conversion, metrics">
    <link rel="canonical" href="https://calcora.com/tech/unit-converter.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script
        type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"Unit Converter","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","url":"https://calcora.com/tech/unit-converter.html"}</script>
</head>

<body>
    <div class="bgfx"></div>
    <nav class="navbar">
        <div class="nav-in"><a href="../index.html" class="logo"><img src="../assets/logo.png" class="logo-img" alt="Calcora Logo"><span class="logo-t">Calcora</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="../index.html" class="nav-link">🏠 Home</a></li>
                <li><a href="unit-converter.html" class="nav-link active">📐 Unit</a></li>
                <li><a href="qr-code-generator.html" class="nav-link">📱 QR</a></li>
                <li><a href="color-converter.html" class="nav-link">🎨 Color</a></li>
            </ul>
            <div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme"><span
                    class="t-icon ic-sun">☀️</span>
                <div class="t-track">
                    <div class="t-knob"></div>
                </div><span class="t-icon ic-moon">🌙</span>
            </div><button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
        </div>
    </nav>
    <div class="page fade-in"><a href="../index.html" class="back">← Back to all tools</a>
        <div class="mod-hdr">
            <h1>Unit Converter</h1>
            <p>Convert between length, weight, temperature, volume, speed, and data units.</p>
        </div>
        <div style="max-width:650px;margin:0 auto">
            <div class="glass">
                <div class="ig">
                    <div class="il"><span>Category</span></div>
                    <select class="ti" id="cat">
                        <option value="length">📏 Length</option>
                        <option value="weight">⚖️ Weight</option>
                        <option value="temp">🌡️ Temperature</option>
                        <option value="volume">🧪 Volume</option>
                        <option value="speed">🏎️ Speed</option>
                        <option value="data">💾 Data</option>
                    </select>
                </div>
                <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end;margin-top:14px">
                    <div>
                        <div class="ig">
                            <div class="il"><span>Value</span></div><input type="number" class="ti" id="val" value="1">
                        </div>
                        <div class="ig">
                            <div class="il"><span>From</span></div><select class="ti" id="from"></select>
                        </div>
                    </div>
                    <div style="text-align:center;padding-bottom:10px"><button class="btn btn-outline"
                            style="border-radius:50%;width:36px;height:36px;padding:0" onclick="swap()">⇄</button></div>
                    <div>
                        <div class="ig">
                            <div class="il"><span>Result</span></div>
                            <div class="out-box" id="result"
                                style="min-height:42px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700">
                            </div>
                        </div>
                        <div class="ig">
                            <div class="il"><span>To</span></div><select class="ti" id="to"></select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="site-ft">
        <p>© 2026 <a href="../index.html">Calcora</a></p>
    </footer>
    <script src="../script.js"></script>
    <script>
        const units = {
            length: { m: 1, km: 1000, cm: 0.01, mm: 0.001, mi: 1609.344, yd: 0.9144, ft: 0.3048, in: 0.0254 },
            weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.453592, oz: 0.0283495, ton: 1000 },
            volume: { l: 1, ml: 0.001, gal: 3.78541, qt: 0.946353, cup: 0.236588, floz: 0.0295735 },
            speed: { mps: 1, kmh: 0.277778, mph: 0.44704, kn: 0.514444 },
            data: { B: 1, KB: 1024, MB: 1048576, GB: 1073741824, TB: 1099511627776 }
        };
        const fromS = document.getElementById('from'), toS = document.getElementById('to'), catS = document.getElementById('cat');
        function populate() {
            const c = catS.value; fromS.innerHTML = ''; toS.innerHTML = '';
            if (c === 'temp') { ['°C', '°F', 'K'].forEach((u, i) => { fromS.add(new Option(u, u)); toS.add(new Option(u, u)); }); toS.selectedIndex = 1; }
            else { Object.keys(units[c]).forEach((u, i) => { fromS.add(new Option(u, u)); toS.add(new Option(u, u)); }); toS.selectedIndex = 1; }
            convert();
        }
        function convert() {
            const c = catS.value, v = +document.getElementById('val').value || 0;
            let r;
            if (c === 'temp') { const f = fromS.value, t = toS.value; let cel = f === '°C' ? v : f === '°F' ? (v - 32) * 5 / 9 : v - 273.15; r = t === '°C' ? cel : t === '°F' ? cel * 9 / 5 + 32 : cel + 273.15; }
            else { const from = units[c][fromS.value], to = units[c][toS.value]; r = v * from / to; }
            document.getElementById('result').textContent = Number.isInteger(r) ? r : r.toPrecision(8);
        }
        function swap() { [fromS.value, toS.value] = [toS.value, fromS.value]; convert(); }
        catS.addEventListener('change', populate);
        fromS.addEventListener('change', convert); toS.addEventListener('change', convert);
        document.getElementById('val').addEventListener('input', convert);
        populate();
    </script>
</body>

</html>
