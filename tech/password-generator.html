                <li><a href="password-generator.html" class="nav-link active">🔐 Pwd</a></li>

            <div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme"><span

                    <div class="t-knob"></div>

        </div>

    <div class="page fade-in"><a href="../index.html" class="back">← Back to all tools</a>
        <div class="mod-hdr">
            <h1>Secure Password Generator</h1>
            <p>Generate cryptographically secure passwords with entropy scoring.</p>
        </div>
        <div class="tool-grid">
            <div class="glass">
                <div class="ctitle"><i>⚙️</i> Settings</div>
                <div class="ig">
                    <div class="il"><span>Length</span><span class="v" id="len-v">16</span></div><input type="range"
                        id="len" min="4" max="64" value="16">
                    <div class="rl"><span>4</span><span>64</span></div>
                </div>
                <div class="ig" style="display:flex;flex-direction:column;gap:8px">
                    <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer"><input
                            type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer"><input
                            type="checkbox" id="lower" checked> Lowercase (a-z)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer"><input
                            type="checkbox" id="nums" checked> Numbers (0-9)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer"><input
                            type="checkbox" id="syms" checked> Symbols (!@#$…)</label>
                </div>
                <button class="btn btn-accent" style="width:100%;margin-top:16px" onclick="gen()">🔄 Generate
                    Password</button>
            </div>
            <div class="glass res-card">
                <div class="ctitle"><i>🔐</i> Your Password</div>
                <div class="out-box" id="pw"
                    style="font-size:1.1rem;word-break:break-all;text-align:center;padding:20px;letter-spacing:1px;min-height:60px">
                </div>
                <button class="copy-btn" style="width:100%;margin-top:12px" onclick="copyPw()">📋 Copy Password</button>
                <div class="str-bar">
                    <div class="str-fill" id="str-fill"></div>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:6px">
                    <span style="font-size:.72rem;color:var(--dim)" id="str-label">Strong</span>
                    <span style="font-size:.72rem;color:var(--dim)" id="entropy">128 bits</span>
                </div>
                <div class="pills" style="margin-top:14px">
                    <div class="pill">
                        <div class="pl">Characters</div>
                        <div class="pv" style="color:var(--cyan)" id="chars">16</div>
                    </div>
                    <div class="pill">
                        <div class="pl">Entropy Bits</div>
                        <div class="pv" style="color:var(--accent2)" id="bits">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="site-ft">
        <p>© 2026 <a href="../index.html">Calcora</a></p>
    </footer>
    <script src="../script.js"></script>
    <script>
        function gen() {
            let pool = '';
            if (document.getElementById('upper').checked) pool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('lower').checked) pool += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('nums').checked) pool += '0123456789';
            if (document.getElementById('syms').checked) pool += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            if (!pool) { pool = 'abcdefghijklmnopqrstuvwxyz'; }
            const len = +document.getElementById('len').value;
            const arr = new Uint32Array(len); crypto.getRandomValues(arr);
            let pw = ''; for (let i = 0; i < len; i++)pw += pool[arr[i] % pool.length];
            document.getElementById('pw').textContent = pw;
            document.getElementById('len-v').textContent = len; document.getElementById('chars').textContent = len;
            const entropy = Math.round(Math.log2(pool.length) * len);
            document.getElementById('bits').textContent = entropy; document.getElementById('entropy').textContent = entropy + ' bits';
            const pct = Math.min(100, entropy / 128 * 100);
            const fill = document.getElementById('str-fill'); fill.style.width = pct + '%';
            const label = document.getElementById('str-label');
            if (entropy < 40) { fill.style.background = '#ef4444'; label.textContent = 'Weak'; }
            else if (entropy < 80) { fill.style.background = '#f59e0b'; label.textContent = 'Fair'; }
            else if (entropy < 128) { fill.style.background = '#22d3ee'; label.textContent = 'Strong'; }
            else { fill.style.background = '#34d399'; label.textContent = 'Very Strong'; }
        }
        function copyPw() { const t = document.getElementById('pw').textContent; navigator.clipboard.writeText(t).then(() => { document.getElementById('str-label').textContent = '📋 Copied!'; }); }
        document.addEventListener('DOMContentLoaded', () => { C.initSliders(); gen(); });
    </script>
